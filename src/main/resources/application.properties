# Swagger(Springfox) 在 Spring Boot 2.6+ 的兼容配置
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# 急单抢占保护配置
# 临近开工保护窗口（分钟）：在该窗口内即将开工的订单不允许被抢占
mes.schedule.urgent-preempt.start-protect-window-minutes=240
# 单个订单+料号抢占时最小保底面积（㎡）
mes.schedule.urgent-preempt.min-protect-area=300
# 单个订单+料号抢占时最小保底比例（0~1）
mes.schedule.urgent-preempt.min-protect-ratio=0.20

# 齐套门禁策略：false=仅READY可放行；true=READY与READY_BY_ETA均可放行
mes.readiness.allow-ready-by-eta=false

# ==================== 物流查询（快递100）配置 ====================
# 开关：true 启用真实物流查询；false 使用未启用提示
mes.logistics.enabled=true
# 快递100查询接口（默认）
mes.logistics.api-url=https://poll.kuaidi100.com/poll/query.do
